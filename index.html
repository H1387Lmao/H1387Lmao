<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0d0d0d;
  font-family: 'M PLUS Rounded 1c', sans-serif;
}

#app {
  display: flex;
  width: 200vw;
  height: 100vh;
  transition: transform 0.42s cubic-bezier(0.77, 0, 0.18, 1);
}
#app.open { transform: translateX(-360px); }

#stage-wrap {
  position: relative;
  width: 100vw;
  flex-shrink: 0;
  height: 100vh;
  overflow: hidden;
  background: #0d0d0d;
}
#stage-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  object-position: center;
  pointer-events: none;
  z-index: 1;
}

#stage-wrap::after {
  content: '';
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 2;
  background: radial-gradient(ellipse at center,
    transparent 35%, rgba(0,0,0,.3) 65%, rgba(0,0,0,.75) 100%);
}
#scene {
  position: absolute; inset: 0;
  z-index: 3;
}

.char {
  position: absolute;
  pointer-events: none;
  user-select: none;
  transition: filter 0.3s;
}
.char img { display: block; }

.chars-dimmed .char        { filter: brightness(0.2) saturate(0.2); }
.chars-dimmed .char.active { filter: none; }

.char.active::after {
  content: '';
  position: absolute; bottom: -4px; left: 50%;
  transform: translateX(-50%);
  width: 70%; height: 18px;
  background: radial-gradient(ellipse, rgba(0,0,0,.7) 0%, transparent 72%);
  border-radius: 50%; filter: blur(3px);
}
.char.active img { animation: charfloat 2.8s ease-in-out infinite; }
@keyframes charfloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

.hitbox {
  position: absolute;
  width: 70%; height: 100%;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  pointer-events: auto;
  cursor: pointer;
  z-index: 10;
}

#hint {
  position: absolute;
  bottom: 6%; left: 50%;
  transform: translateX(-50%);
  font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
  color: rgba(255,220,220,.4);
  pointer-events: none; white-space: nowrap;
  transition: opacity .4s;
  animation: hpulse 3s ease-in-out infinite;
}
@keyframes hpulse { 0%,100%{opacity:.4} 50%{opacity:.8} }

#panel {

<script>

let currentAudio = null;
let currentSongBtn = null;

function playSong(btn, url, franchiseId) {
  if (currentAudio && !currentAudio.paused && currentSongBtn === btn) {
    currentAudio.pause();
    btn.innerHTML = getSongIcon('play');
    currentSongBtn = null;
    return;
  }
  if (currentAudio) {
    currentAudio.pause();
    if (currentSongBtn) currentSongBtn.innerHTML = getSongIcon('play');
  }
  currentAudio = new Audio(url);
  currentAudio.volume = 0.7;
  currentAudio.play().catch(() => {});
  btn.innerHTML = getSongIcon('pause');
  currentSongBtn = btn;
  currentAudio.onended = () => {
    btn.innerHTML = getSongIcon('play');
    currentSongBtn = null;
  };
}

function getSongIcon(state) {
  return state === 'play'
    ? `<svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11"><polygon points="5,3 19,12 5,21"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>`;
}

const expandedState = {};

function toggleExpand(id) {
  expandedState[id] = !expandedState[id];
  const pc = document.getElementById('page-content');
  if (pc) {
    pc.innerHTML = buildAnimeLibraryHTML();
  }
}

function formatDate(dateString) {
  const date = new Date(dateString);
  return new Intl.DateTimeFormat(navigator.language, { dateStyle:"medium", timeStyle:"short" }).format(date);
}

function relativeTime(dateString) {
  const diff = new Date() - new Date(dateString);
  const days = Math.floor(diff / (1000*60*60*24));
  if (days <= 0) return `${Math.floor(diff/(1000*60*60))} hours ago`;
  if (days === 1) return "1 day ago";
  return `${days} days ago`;
}

function buildStarRating(rating, accentColor) {
  const filled = Math.round(rating * 2) / 2; // round to .5
  const ratingColor = rating >= 9 ? '#f7d44c' : rating >= 7 ? '#a8d8a8' : '#e05555';
  return `
    <div class="anime-rating" style="color:${ratingColor}">
      <svg viewBox="0 0 12 12" fill="currentColor" width="11" height="11" style="vertical-align:-1px">
        <polygon points="6,1 7.5,4.5 11,5 8.5,7.5 9.2,11 6,9.2 2.8,11 3.5,7.5 1,5 4.5,4.5"/>
      </svg>
      <span style="font-size:12px;font-weight:700;letter-spacing:.03em">${rating.toFixed(1)}</span>
      <span style="font-size:10px;color:rgba(255,255,255,0.25)">/10</span>
    </div>`;
}

function buildSongPlayer(song, accentColor, franchiseId) {
  if (!song) return '';
  return `
    <div class="song-player" style="--song-accent:${accentColor}">
      <button class="song-play-btn" id="songbtn-${franchiseId}" onclick="event.stopPropagation();playSong(this,'${song.url}','${franchiseId}')">
        ${getSongIcon('play')}
      </button>
      <div class="song-info">
        <div class="song-title">${song.title}</div>
        <div class="song-artist">${song.artist}</div>
      </div>
    </div>`;
}

function buildSeasonRow(s, accentColor) {
  const pct2 = (s.watchedEpisodes / s.totalEpisodes) * 100;
  return `
    <div class="season-row">
      <div class="season-header">
        <div class="season-title">${s.title}</div>
        ${s.note ? `<div class="season-note">${s.note}</div>` : ''}
      </div>
      <div class="season-progress-wrap">
        <div class="season-progress-track">
          <div class="season-progress-fill" style="width:${pct2}%;background:${accentColor}"></div>
        </div>
        <div class="season-ep-count">${s.watchedEpisodes}/${s.totalEpisodes}</div>
      </div>
    </div>`;
}

function hexToRgba(hex, alpha = 1) {
  hex = hex.replace(/^#/, '');
  if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
  const r = parseInt(hex.substring(0,2),16);
  const g = parseInt(hex.substring(2,4),16);
  const b = parseInt(hex.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function getRect() {
  const sw = document.getElementById('stage-wrap');
  const ww = sw.clientWidth, wh = sw.clientHeight;
  const a = IMG_W/IMG_H, wa = ww/wh;
  let iw,ih,ox,oy;
  if (wa>a){ih=wh;iw=ih*a;oy=0;ox=(ww-iw)/2;}
  else{iw=ww;ih=iw/a;ox=0;oy=(wh-ih)/2;}
  return {ox,oy,iw,ih};
}

function positionChars() {
  const {ox,oy,iw,ih} = getRect();
  for (const [id,l] of Object.entries(LAYOUT)) {
    const el = document.getElementById('char-'+id);
    const img = el.querySelector('img');
    const ch = ih*l.h;
    img.style.height = ch+'px';
    el.style.left   = (ox+l.x*iw)+'px';
    el.style.top    = (oy+l.y*ih-ch)+'px';
    el.style.zIndex = l.z;
  }
}

let current = null;

function getTabContent(charId, tabName) {
  const raw = CHARS[charId].tabs[tabName];
  if (raw === '__ANIME_LIBRARY__') return buildAnimeLibraryHTML();
  return raw;
}

function applyTagColors(container, color) {
  container.querySelectorAll('.tag').forEach(b => {
    b.style.setProperty('color', hexToRgba(color, 0.9), 'important');
    b.style.setProperty('background-color', hexToRgba(color, 0.15), 'important');
    b.style.setProperty('border', `1px solid ${hexToRgba(color, 0.4)}`, 'important');
  });
}

function openChar(id) {
  if (current === id) { closePanel(); return; }
  current = id;
  const d = CHARS[id];
  const tabs = Object.keys(d.tabs);

  document.querySelectorAll('.char').forEach(c => c.classList.remove('active'));
  document.getElementById('char-'+id).classList.add('active');
  document.getElementById('scene').classList.add('chars-dimmed');

  document.getElementById('char-name').textContent = d.name;
  const roleEl = document.getElementById('char-role');
  roleEl.textContent = d.role;
  roleEl.style.color = d.color;
  document.getElementById('panel').style.setProperty('--cc', d.color);

  document.getElementById('tab-bar').innerHTML = tabs.map((t,i) =>
    `<button class="tab-btn${i===0?' active':''}" onclick="switchTab('${t}',this)">${t}</button>`
  ).join('');

  const pc = document.getElementById('page-content');
  pc.innerHTML = getTabContent(id, tabs[0]);
  applyTagColors(pc, d.color);

  document.getElementById('app').classList.add('open');
  document.getElementById('hint').style.opacity = '0';
  if (id === 'bocchi') setTimeout(loadLastfm, 0);
  if (id === 'ikuyo') setTimeout(loadKessokuStat, 0);
}

function switchTab(name, btn) {
  const d = CHARS[current];
  if (!d) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const pc = document.getElementById('page-content');
  pc.innerHTML = getTabContent(current, name);
  pc.scrollTop = 0;
  applyTagColors(pc, d.color);
  if (name === 'Interests') setTimeout(loadLastfm, 0);
}

function closePanel() {
  current = null;
  document.getElementById('app').classList.remove('open');
  document.getElementById('scene').classList.remove('chars-dimmed');
  document.querySelectorAll('.char').forEach(c => c.classList.remove('active'));
  setTimeout(() => document.getElementById('hint').style.opacity = '', 420);
}

const LASTFM_API_KEY  = 'cb7d6f9cb5a35e63b4cfb3890d9ad871';
const LASTFM_USERNAME = 'Noto_-';
const LASTFM_LIMIT    = 5;

function timeSince(unixTs) {
  const diff = Math.floor(Date.now() / 1000) - parseInt(unixTs, 10);
  if (diff < 60)  return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

async function loadLastfm() {
  const container = document.getElementById('lastfm-tracks');
  if (!container) return;

  try {
    const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${encodeURIComponent(LASTFM_USERNAME)}&api_key=${LASTFM_API_KEY}&format=json&limit=${LASTFM_LIMIT}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.error) {
      container.innerHTML = `<div class="lastfm-error">Last.fm error: ${data.message}</div>`;
      return;
    }

    const tracks = data.recenttracks?.track || [];
    if (!tracks.length) {
      container.innerHTML = `<div class="lastfm-error">No recent tracks found.</div>`;
      return;
    }

    container.innerHTML = tracks.map((t, i) => {
      const isNow = t['@attr']?.nowplaying === 'true';
      const art   = t.image?.find(img => img.size === 'medium')?.['#text'];
      const artEl = art
        ? `<img class="lastfm-track-art" src="${art}" alt="" loading="lazy">`
        : `<div class="lastfm-track-art-placeholder">♪</div>`;
      const timeEl = isNow
        ? `<div class="lastfm-now-dot"></div>`
        : `<div class="lastfm-track-time">${timeSince(t.date?.uts)}</div>`;
      return `
        <a class="lastfm-track" href="${t.url}" target="_blank" rel="noopener">
          ${artEl}
          <div class="lastfm-track-info">
            <div class="lastfm-track-name">${t.name}</div>
            <div class="lastfm-track-artist">${t.artist?.['#text'] || ''}</div>
          </div>
          ${timeEl}
        </a>`;
    }).join('');
  } catch (e) {
    container.innerHTML = `<div class="lastfm-error">Could not reach Last.fm.</div>`;
  }
}

async function loadKessokuStat() {
  try {
    const url = `https://ws.audioscrobbler.com/2.0/?method=library.getartists&user=${encodeURIComponent(LASTFM_USERNAME)}&api_key=${LASTFM_API_KEY}&format=json&limit=200`;
    const res  = await fetch(url);
    const data = await res.json();
    const artists = data.artists?.artist || [];
    const kb = artists.find(a => a.name.toLowerCase() === 'kessoku band');
    const el = document.getElementById('kessoku-minutes');
    const sub = document.getElementById('kessoku-scrobbles');
    if (!el) return;
    if (kb) {
      const plays = parseInt(kb.playcount, 10);
      const mins  = Math.round(plays * 3.5);
      el.textContent  = mins.toLocaleString();
      sub.textContent = plays.toLocaleString() + ' scrobbles';
    } else {
      el.textContent = 'No data';
    }
  } catch(e) {
    const el = document.getElementById('kessoku-minutes');
    if (el) el.textContent = '—';
  }
}

document.getElementById('stage-wrap').addEventListener('click', e => {
  const hit = ['ryo','bocchi','nijika','ikuyo']
    .some(id => document.getElementById('char-'+id).contains(e.target));
  if (!hit) closePanel();
});

window.addEventListener('resize', positionChars);
document.getElementById('stage-img').addEventListener('load', positionChars);
setTimeout(positionChars, 50);
</script>
</body>
</html>
