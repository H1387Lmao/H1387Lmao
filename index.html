<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anoto To?</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0d0d0d;
  font-family: 'M PLUS Rounded 1c', sans-serif;
}

#app {
  display: flex;
  width: 200vw;
  height: 100vh;
  transition: transform 0.42s cubic-bezier(0.77, 0, 0.18, 1);
}
#app.open { transform: translateX(-360px); }

#stage-wrap {
  position: relative;
  width: 100vw;
  flex-shrink: 0;
  height: 100vh;
  overflow: hidden;
  background: #0d0d0d;
}
#stage-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  object-position: center;
  pointer-events: none;
  z-index: 1;
}

#stage-wrap::after {
  content: '';
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 2;
  background: radial-gradient(ellipse at center,
    transparent 35%, rgba(0,0,0,.3) 65%, rgba(0,0,0,.75) 100%);
}
#scene {
  position: absolute; inset: 0;
  z-index: 3;
}

.char {
  position: absolute;
  pointer-events: none;
  user-select: none;
  transition: filter 0.3s;
}
.char img { display: block; }

.chars-dimmed .char        { filter: brightness(0.2) saturate(0.2); }
.chars-dimmed .char.active { filter: none; }

.char.active::after {
  content: '';
  position: absolute; bottom: -4px; left: 50%;
  transform: translateX(-50%);
  width: 70%; height: 18px;
  background: radial-gradient(ellipse, rgba(0,0,0,.7) 0%, transparent 72%);
  border-radius: 50%; filter: blur(3px);
}
.char.active img { animation: charfloat 2.8s ease-in-out infinite; }
@keyframes charfloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

.hitbox {
  position: absolute;
  width: 70%; height: 100%;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  pointer-events: auto;
  cursor: pointer;
  z-index: 10;
}

#hint {
  position: absolute;
  bottom: 6%; left: 50%;
  transform: translateX(-50%);
  font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
  color: rgba(255,220,220,.4);
  pointer-events: none; white-space: nowrap;
  transition: opacity .4s;
  animation: hpulse 3s ease-in-out infinite;
}
@keyframes hpulse { 0%,100%{opacity:.4} 50%{opacity:.8} }

#panel {
  position: relative;
  width: 360px;
  flex-shrink: 0;
  height: 100vh;
  overflow: hidden;
  background: rgba(8,4,16,0.98);
  border-left: 1px solid rgba(160,60,60,.35);
}

#panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px; z-index: 5;
  background: linear-gradient(90deg, transparent, #eeb8c4, #e6d47b, #3a4664, transparent);
}

#panel-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 120px;
  padding: 32px 24px 0;
  z-index: 2;
}
#panel-close {
  position: absolute; top: 14px; right: 14px;
  width: 28px; height: 28px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 50%;
  color: rgba(255,255,255,.5);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, color .2s;
}
#panel-close:hover { background: rgba(200,40,40,.35); color: #fff; }

#char-name {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 22px; color: #fff;
  letter-spacing: .05em; margin-bottom: 3px;
}
#char-role {
  font-size: 10px; letter-spacing: .25em; text-transform: uppercase;
}

#tab-bar {
  position: absolute;
  top: 120px; left: 0; right: 0;
  height: 42px;
  display: flex;
  align-items: flex-end;
  border-bottom: 1px solid rgba(160,60,60,.25);
  padding: 0 16px;
  gap: 4px;
  z-index: 2;
  background: rgba(8,4,16,0.98);
}
.tab-btn {
  background: none; border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  padding: 8px 12px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
  color: rgba(200,160,160,.45);
  cursor: pointer;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
}
.tab-btn:hover  { color: rgba(200,160,160,.8); }
.tab-btn.active { color: #fff; border-bottom-color: var(--cc, #cc3333); }

#page-content {
  position: absolute;
  top: 162px;
  left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  padding: 22px 24px 32px;
  /* text */
  color: #e8d8d8;
  font-size: 14px;
  line-height: 1.85;
  scrollbar-width: thin;
  scrollbar-color: rgba(160,50,50,.35) transparent;
}
#page-content::-webkit-scrollbar { width: 3px; }
#page-content::-webkit-scrollbar-thumb { background: rgba(160,50,50,.4); border-radius: 2px; }

#page-content h3 {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 14px; color: #fff; letter-spacing: .06em;
  margin: 20px 0 8px;
}
#page-content h3:first-child { margin-top: 0; }
#page-content p  { margin-bottom: 10px; color: #d8c8c8; }
#page-content ul { padding-left: 18px; margin-bottom: 10px; }
#page-content li { margin-bottom: 4px; color: #d8c8c8; }
#page-content em { color: #e8aaaa; font-style: italic; }
#page-content strong { color: #fff; }

.tag {
  display: inline-block;
  padding: 2px 9px; margin: 2px 3px 2px 0;
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  border-radius: 3px;
  border: 1px solid rgba(160,60,60,.4);
  background: rgba(160,40,40,.15);
  color: rgba(210,140,140,.9);
}

.stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.stat-label {
  font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  color: rgba(200,160,160,.55); width: 85px; flex-shrink: 0;
}
.stat-bar-wrap {
  flex: 1; height: 4px;
  background: rgba(255,255,255,.08);
  border-radius: 2px; overflow: hidden;
}
.stat-bar {
  height: 100%; border-radius: 2px;
  background: #e05555;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

</style>
</head>
<body>
<div id="app">
  <div id="stage-wrap">
    <img id="stage-img" src="assets/background.webp" alt="" draggable="false">
    <div id="scene">

      <div class="char" id="char-ryo">
        <img src="assets/ryo.gif" alt="Ryo">
        <div class="hitbox" onclick="openChar('ryo')"></div>
      </div>
      <div class="char" id="char-ikuyo">
        <img src="assets/kita.gif" alt="Ikuyo">
        <div class="hitbox" onclick="openChar('ikuyo')"></div>
      </div>
      <div class="char" id="char-nijika">
        <img src="assets/nijika.gif" alt="Nijika">
        <div class="hitbox" onclick="openChar('nijika')"></div>
      </div>
      <div class="char" id="char-bocchi">
        <img src="assets/hitori.gif" alt="Bocchi">
        <div class="hitbox" onclick="openChar('bocchi')"></div>
      </div>

      <div id="hint">click a member</div>
    </div>
  </div>
  <div id="panel">
    <div id="panel-header">
      <button id="panel-close" onclick="closePanel()">✕</button>
      <div id="char-name"></div>
      <div id="char-role"></div>
    </div>
    <div id="tab-bar"></div>
    <div id="page-content"></div>
  </div>

</div>
<script>
const CHARS = {
  bocchi: {
    name: "About Me",
    role: "My Identity",
    color: "#eeb8c4",
    tabs: {
      About: `
        <h3>About Me</h3>
        <p>I relate heavily to Bocchi <span style='color: rgba(255, 255, 255, 0.5);'>shes just like me frfr</span></p>
        
        <p>Socially awkward, overthinking everything, but deeply passionate about what I do.</p>
        <p>But unlike Hitori Gotoh im not talented lmao.</p>
        <p>Also bocchi is goated :)</p>

        <div class="tag">Introvert</div>
        <div class="tag">Overthinker</div>
      `,
      Interests: `
        <h3>My interests</h3>

        <h4>Anime/Manga</h4>

        <p>I love watching anime and reading manga.</p>
        <p>My favorite animes are Bocchi the rock, and Konosuba</p>

        <p>I also like Umamusume, both the anime and the game.</p>

        <br>

        <h4>Programming</h4>

        <p>I've been programming since i was 7. So im bound to like it.</p>
        <p>I know how to write in 10 programming languages</p>
        <p>Yet I prefer writing in Python and Lua</p>

        <br>

        <h4>Discord Bot</h4>

        <p>I love creating Discord Bots.</p>
      `,
      'Bocchi The Rock': `
        <h3>Bocchi the rock</h3>

        <h4>Listening stats</h4>

        <p>I've been listening to Kessoku and SICKHACK almost everyday after I first watched it<p>
        <p>I currently have 320 Hours on spotify (Updated: 5/9/2026)<p>

        <h4>Watching stats</h4>
        <p>I've been a fan of Bocchi the rock since March 28, 2026</p>
        <p>I have watched all bocchi the rock in 5 hours.</p>
        <p>My favorite character is (ALL OF THEM)</p>

        <h4>Reading stats</h4>
        <p>I have read all the chapters and volumes of Bocchi the rock in 2 days</p>
        <p>My favorite arc of the manga is the Makikunin Riot</p>
        <p>I have also read the Kikuri Heavy Drinking Diary<p>

        <div class="tag">I love the music so much</div>
      `
    }
  },

  nijika: {
    name: "Personality",
    role: "My Passion",
    color: "#e6d47b",
    tabs: {
      Personality: `
        <h3>Personality</h3>
        <p>Like nijika, im very passionate about my dreams of becoming a good developer and creating projects.</p>
        <p>Optimism, leadership, and forcing progress even when nothing works.</p>

        <div class="tag">Optimistic</div>
        <div class="tag">Passionate</div>
        <div class="tag">High Energy</div>
      `
    }
  },

  ryo: {
    name: "Projects",
    role: "My Works",
    color: "#3a8cc8",
    tabs: {
      Projects: `
        <h3>Projects</h3>
        <ul>
          <li><strong>UICord</strong> A ComponentV2 Ecosystem for Discord Bots</li>
          <li><strong>Uma Bot</strong> Umamusume as a discord bot.</li>
        </ul>

        <p>Like Ryo Yamada, she's the core part of Kessoku Music, as she is the one who writes them.
          I picked her for this section because this contains all the projects i'm proud of.
        </p>

        <div class="tag">It's all discord :(</div>
      `
    }
  },

  ikuyo: {
    name: "Statistics",
    role: "My Stats",
    color: "#e05555",
    tabs: {
      Skills: `
        <h3>Skills</h3>

        <div class="stat-row"><div class="stat-label">Larping</div><br><div class="stat-bar-wrap"><div class="stat-bar" style="width:96%"></div></div></div>
        <div class="stat-row"><div class="stat-label">Energy</div><br><div class="stat-bar-wrap"><div class="stat-bar" style="width:98%"></div></div></div>
        <div class="stat-row"><div class="stat-label">Passion</div><br><div class="stat-bar-wrap"><div class="stat-bar" style="width:88%"></div></div></div>
        <div class="stat-row"><div class="stat-label">Communication</div><br><div class="stat-bar-wrap"><div class="stat-bar" style="width:13%"></div></div></div>

        <p>I chose Kita Ikuyo for this section because i dont know</p>
        <div class="tag">We love Yuri</div>
      `
    }
  }
};

const IMG_W = 556, IMG_H = 471;
const LAYOUT = {
  ryo:    { x:0.20, y:0.72, h:0.26, z:3 },
  bocchi: { x:0.60, y:0.72, h:0.27, z:4 },
  nijika: { x:0.48, y:0.68, h:0.23, z:2 },
  ikuyo:  { x:0.36, y:0.75, h:0.27, z:5 },
};
function hexToRgba(hex, alpha = 1) {
  hex = hex.replace(/^#/, '');

  if (hex.length === 3) {
    hex = hex.split('').map(char => char + char).join('');
  }

  const r = parseInt(hex.substring(0, 2), 16);
  const g = parseInt(hex.substring(2, 4), 16);
  const b = parseInt(hex.substring(4, 6), 16);

  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function getRect() {
  const sw = document.getElementById('stage-wrap');
  const ww = sw.clientWidth, wh = sw.clientHeight;
  const a = IMG_W/IMG_H, wa = ww/wh;
  let iw,ih,ox,oy;
  if (wa>a){ih=wh;iw=ih*a;oy=0;ox=(ww-iw)/2;}
  else{iw=ww;ih=iw/a;ox=0;oy=(wh-ih)/2;}
  return {ox,oy,iw,ih};
}
function positionChars() {
  const {ox,oy,iw,ih} = getRect();
  for (const [id,l] of Object.entries(LAYOUT)) {
    const el = document.getElementById('char-'+id);
    const img = el.querySelector('img');
    const ch = ih*l.h;
    
    img.style.height = ch+'px';
    el.style.left   = (ox+l.x*iw)+'px';
    el.style.top    = (oy+l.y*ih-ch)+'px';
    el.style.zIndex = l.z;
  }
}

let current = null;

function openChar(id) {
  if (current === id) { closePanel(); return; }
  current = id;
  const d = CHARS[id];
  const tabs = Object.keys(d.tabs);

  document.querySelectorAll('.char').forEach(c => c.classList.remove('active'));
  document.getElementById('char-'+id).classList.add('active');
  document.getElementById('scene').classList.add('chars-dimmed');

  document.getElementById('char-name').textContent = d.name;
  const roleEl = document.getElementById('char-role');
  roleEl.textContent = d.role;
  roleEl.style.color = d.color;
  document.getElementById('panel').style.setProperty('--cc', d.color);

  document.getElementById('tab-bar').innerHTML = tabs.map((t,i) =>
    `<button class="tab-btn${i===0?' active':''}" onclick="switchTab('${t}',this)">${t}</button>`
  ).join('');

  document.getElementById('page-content').innerHTML = d.tabs[tabs[0]];

  document.getElementById('app').classList.add('open');
  document.getElementById('hint').style.opacity = '0';

  document.getElementById('page-content').querySelectorAll('.tag').forEach(
    b => {
      b.style.setProperty('color', hexToRgba(d.color, 0.9), 'important');
      b.style.setProperty('background-color', hexToRgba(d.color, 0.15), 'important');
      b.style.setProperty('border', `1px solid ${hexToRgba(d.color, 0.9)}`, 'important');
    }
  );
}

function switchTab(name, btn) {
  const d = CHARS[current];
  if (!d) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const pc = document.getElementById('page-content');
  pc.innerHTML = d.tabs[name];
  pc.scrollTop = 0;

  pc.querySelectorAll('.tag').forEach(
    b => {
      b.style.setProperty('color', hexToRgba(d.color, 0.9), 'important');
      b.style.setProperty('background-color', hexToRgba(d.color, 0.15), 'important');
      b.style.setProperty('border', `1px solid ${hexToRgba(d.color, 0.9)}`, 'important');
    }
  );
}

function closePanel() {
  current = null;
  document.getElementById('app').classList.remove('open');
  document.getElementById('scene').classList.remove('chars-dimmed');
  document.querySelectorAll('.char').forEach(c => c.classList.remove('active'));
  setTimeout(() => document.getElementById('hint').style.opacity = '', 420);
}

document.getElementById('stage-wrap').addEventListener('click', e => {
  const hit = ['ryo','bocchi','nijika','ikuyo']
    .some(id => document.getElementById('char-'+id).contains(e.target));
  if (!hit) closePanel();
});

window.addEventListener('resize', positionChars);
document.getElementById('stage-img').addEventListener('load', positionChars);
setTimeout(positionChars, 50);
</script>
</body>
</html>
